<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的浪漫收集册</title>
    <style>
        :root {
            --main-pink: #ffafbd;
            --soft-pink: #ffc3a0;
            --accent-color: #ff6b6b;
            --bg-color: #fff5f6;
            --disabled-gray: #ccc;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #555;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 顶部看板 */
        .dashboard {
            background: white;
            width: 95%;
            max-width: 400px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(255, 175, 189, 0.3);
            text-align: center;
            margin-bottom: 20px;
            border: 2px dashed var(--main-pink);
            box-sizing: border-box;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }

        .stat-item span {
            display: block;
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
        }

        /* 任务列表 */
        .section-title {
            align-self: flex-start;
            margin: 15px 0 8px 5%;
            font-size: 1.1em;
            color: var(--accent-color);
            font-weight: bold;
        }

        .task-card {
            background: #fff;
            width: 90%;
            max-width: 400px;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn-check {
            background: var(--main-pink);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 80px;
        }

        .btn-check:disabled {
            background: var(--disabled-gray);
            cursor: not-allowed;
        }

        /* 抽卡区 */
        #draw-btn {
            background: linear-gradient(45deg, var(--main-pink), var(--accent-color));
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            margin: 20px 0;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
            display: none;
        }

        /* 卡库展示 */
        .album {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 400px;
            margin-top: 20px;
        }

        .card-slot {
            background: #eee;
            aspect-ratio: 3/4;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card-active {
            background: white;
            border: 2px solid var(--main-pink);
        }

        .card-count {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--accent-color);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-content {
            text-align: center;
            padding: 10px;
        }

        /* 弹窗样式 */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .new-card-anim {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 70%;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2 style="margin:0; color: var(--accent-color);">💌 专属异次元手账</h2>
        <div class="stats">
            <div class="stat-item">总打卡<span id="total-count">0</span></div>
            <div class="stat-item">可抽卡<span id="draw-count">0</span></div>
        </div>
    </div>

    <button id="draw-btn" onclick="drawCard()">✨ 消耗5分，抽取卡片！</button>

    <div class="section-title">💕 浪漫任务</div>
    <div class="task-card"><span>给老婆写诗</span><button class="btn-check" id="task-poem" onclick="doTask('poem')">打卡</button></div>
    <div class="task-card"><span>一起看电影</span><button class="btn-check" id="task-movie" onclick="doTask('movie')">打卡</button></div>
    <div class="task-card"><span>新餐厅探店</span><button class="btn-check" id="task-food" onclick="doTask('food')">打卡</button></div>

    <div class="section-title">🧹 家务挑战</div>
    <div class="task-card"><span>主动洗衣服</span><button class="btn-check" id="task-wash" onclick="doTask('wash')">打卡</button></div>
    <div class="task-card"><span>洗碗/做饭</span><button class="btn-check" id="task-cook" onclick="doTask('cook')">打卡</button></div>
    <div class="task-card"><span>主动扔垃圾</span><button class="btn-check" id="task-trash" onclick="doTask('trash')">打卡</button></div>

    <div class="section-title">📔 卡牌收集册</div>
    <div class="album" id="card-album"></div>

    <div id="overlay" onclick="closeOverlay()">
        <div class="new-card-anim" id="reward-box">
            <h1 style="color:var(--accent-color)">🎉 获得新奖励！</h1>
            <div id="new-card-detail"></div>
            <p style="color:#999; font-size: 0.8em; margin-top:20px;">点击任意位置收回相册</p>
        </div>
    </div>

    <script>
        // 更新后的卡池
        const cardPool = [
            { id: 1, name: "陪看剧券", rarity: "SR", desc: "陪你看30分钟你爱看的剧，不许玩手机" },
            { id: 2, name: "任性点单券", rarity: "SR", desc: "今天吃什么由你说了算，老婆买单" },
            { id: 3, name: "专属按摩券", rarity: "SSR", desc: "兑换老婆亲手全身按摩30分钟" },
            { id: 4, name: "购物车清空券", rarity: "SSR", desc: "200元额度内，老婆帮你清空！" },
            { id: 5, name: "森林浇水券", rarity: "UR", desc: "老婆为你浇水蚂蚁森林，见证爱情成长" },
            { id: 6, name: "深夜夜宵券", rarity: "R", desc: "老婆亲手煮的面或爱心宵夜一份" }
        ];

        // 核心数据结构：使用对象存储卡牌数量 {卡片ID: 数量}
        let userData = JSON.parse(localStorage.getItem('coupleData_v2')) || {
            total: 0,
            draws: 0,
            ownedCards: {} 
        };

        function updateUI() {
            document.getElementById('total-count').innerText = userData.total;
            document.getElementById('draw-count').innerText = userData.draws;
            document.getElementById('draw-btn').style.display = userData.draws > 0 ? 'block' : 'none';
            
            const album = document.getElementById('card-album');
            album.innerHTML = '';
            cardPool.forEach(card => {
                const count = userData.ownedCards[card.id] || 0;
                const slot = document.createElement('div');
                slot.className = `card-slot ${count > 0 ? 'card-active' : ''}`;
                
                if (count > 0) {
                    slot.innerHTML = `
                        <div class="card-count">x${count}</div>
                        <div class="card-content">
                            <b style="color:var(--accent-color); font-size:10px;">[${card.rarity}]</b><br>
                            <span style="font-weight:bold; font-size:13px;">${card.name}</span>
                        </div>`;
                } else {
                    slot.innerHTML = `<div style="color:#ccc; font-size:24px">?</div>`;
                }
                album.appendChild(slot);
            });
            localStorage.setItem('coupleData_v2', JSON.stringify(userData));
        }

        function doTask(taskId) {
            const btn = document.getElementById('task-' + taskId);
            
            // 增加总进度
            userData.total++;
            if (userData.total % 5 === 0) {
                userData.draws++;
            }
            
            // 冷却逻辑 (60秒)
            btn.disabled = true;
            let timeLeft = 60;
            btn.innerText = timeLeft + 's';
            
            const timer = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerText = '打卡';
                } else {
                    btn.innerText = timeLeft + 's';
                }
            }, 1000);

            updateUI();
        }

        function drawCard() {
            if (userData.draws <= 0) return;
            userData.draws--;
            
            const randomCard = cardPool[Math.floor(Math.random() * cardPool.length)];
            
            // 增加拥有数量
            userData.ownedCards[randomCard.id] = (userData.ownedCards[randomCard.id] || 0) + 1;

            document.getElementById('new-card-detail').innerHTML = `
                <div style="font-size: 1.5em; margin: 10px 0;">【${randomCard.rarity}】</div>
                <div style="font-size: 1.8em; color: var(--accent-color); font-weight:bold;">${randomCard.name}</div>
                <p style="padding:10px;">${randomCard.desc}</p>
                <div style="font-weight:bold">当前拥有：x${userData.ownedCards[randomCard.id]}</div>
            `;
            document.getElementById('overlay').style.display = 'flex';
            updateUI();
        }

        function closeOverlay() {
            document.getElementById('overlay').style.display = 'none';
        }

        updateUI();
    </script>
</body>
</html>
