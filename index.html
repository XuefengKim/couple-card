<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💌 我们的浪漫收藏本</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* 调色盘：提升饱和度和对比度 */
            --bg-gradient: linear-gradient(135deg, #ffeef2 0%, #ffc0cb 100%);
            --deep-pink: #d6336c; /* 深粉色，用于标题 */
            --text-dark: #4a3737; /* 深咖啡色，用于正文，可读性更强 */
            --accent-pink: #f72585; /* 鲜艳点缀色 */
            --card-white: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'PingFang SC', 'STHeiti', 'Microsoft YaHei', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            padding: 30px 0 80px 0;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 看板 */
        .dashboard {
            background: var(--card-white);
            width: 88%;
            max-width: 380px;
            padding: 25px 20px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(214, 51, 108, 0.2);
            text-align: center;
            margin-bottom: 25px;
            border: 2px solid #fff;
            box-sizing: border-box;
        }

        .dashboard h2 {
            margin: 0 0 8px 0;
            color: var(--deep-pink);
            font-size: 1.5em;
            font-weight: bold;
        }

        .dashboard p {
            margin: 0;
            font-size: 0.85em;
            color: #7d6363;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            padding: 10px 0;
        }

        .stat-item span {
            display: block;
            font-size: 30px;
            font-weight: bold;
            color: var(--accent-pink);
            font-family: 'Georgia', serif;
        }

        .stat-item p {
            font-size: 12px;
            margin: 2px 0 0 0;
            color: var(--deep-pink);
            font-weight: 500;
        }

        /* 任务区 */
        .section-container {
            width: 88%;
            max-width: 380px;
        }

        .section-title {
            font-size: 1em;
            color: var(--deep-pink);
            margin: 20px 0 12px 10px;
            display: flex;
            align-items: center;
            font-weight: bold;
        }

        .task-card {
            background: var(--card-white);
            padding: 15px 18px;
            border-radius: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .task-name {
            font-size: 0.95em;
            color: var(--text-dark);
            font-weight: 500;
        }

        .btn-check {
            background: var(--deep-pink);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .btn-check:disabled {
            background: #d1b1b1;
            opacity: 0.7;
        }

        /* 抽卡按钮 */
        #draw-btn {
            background: var(--accent-pink);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(247, 37, 133, 0.4);
            display: none;
            margin: 10px 0 20px 0;
        }

        /* 收集册 */
        .album {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 88%;
            max-width: 380px;
        }

        .card-slot {
            background: rgba(255, 255, 255, 0.4);
            aspect-ratio: 3/4;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px dashed var(--deep-pink);
            box-sizing: border-box;
        }

        .card-active {
            background: white;
            border: 2px solid white;
            box-shadow: 0 5px 15px rgba(214, 51, 108, 0.15);
        }

        /* 弹窗中的实体卡片 */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .reward-card {
            background: white;
            width: 280px;
            height: 400px;
            border-radius: 20px;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            border: 8px solid white;
            animation: cardPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardPop {
            from { transform: scale(0.5) rotate(10deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .card-inner-border {
            border: 2px solid var(--medium-pink);
            flex: 1;
            width: 100%;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
            background: linear-gradient(to bottom, #fff, #fff0f3);
        }

        .rarity-label {
            font-size: 1.2em;
            font-weight: 900;
            font-family: 'serif';
            margin-bottom: 10px;
        }

        .rarity-ur { color: #fb6f92; text-shadow: 0 0 5px rgba(251,111,146,0.3); }
        .rarity-ssr { color: #ff85a1; }
        .rarity-sr { color: #cdb4db; }
        .rarity-r { color: #bde0fe; }

        .footer { margin-top: 50px; font-size: 0.8em; color: var(--deep-pink); opacity: 0.6; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>我们的浪漫收藏本</h2>
        <p>收集点滴心意，兑换专属惊喜</p>
        <div class="stats">
            <div class="stat-item">
                <span id="total-count">0</span>
                <p>累计心意</p>
            </div>
            <div class="stat-item">
                <span id="draw-count">0</span>
                <p>待领惊喜</p>
            </div>
        </div>
    </div>

    <button id="draw-btn" onclick="drawCard()">开启惊喜盲盒 ✨</button>

    <div class="section-container">
        <div class="section-title"><i class="far fa-heart"></i> 浪漫任务</div>
        <div class="task-card"><span class="task-name">给老婆写一首小诗</span><button class="btn-check" id="task-poem" onclick="doTask('poem')">打卡</button></div>
        <div class="task-card"><span class="task-name">记录一次电影时光</span><button class="btn-check" id="task-movie" onclick="doTask('movie')">打卡</button></div>
        <div class="task-card"><span class="task-name">打卡一家心动餐厅</span><button class="btn-check" id="task-food" onclick="doTask('food')">打卡</button></div>
    </div>

    <div class="section-container">
        <div class="section-title"><i class="far fa-star"></i> 日常点滴</div>
        <div class="task-card"><span class="task-name">分担一次衣物洗涤</span><button class="btn-check" id="task-wash" onclick="doTask('wash')">打卡</button></div>
        <div class="task-card"><span class="task-name">承包今天的厨房</span><button class="btn-check" id="task-cook" onclick="doTask('cook')">打卡</button></div>
        <div class="task-card"><span class="task-name">顺手带走门口的垃圾</span><button class="btn-check" id="task-trash" onclick="doTask('trash')">打卡</button></div>
    </div>

    <div class="section-container"><div class="section-title"><i class="far fa-images"></i> 我的收集册</div></div>
    <div class="album" id="card-album"></div>

    <div class="footer">始终如一的浪漫 · 2024</div>

    <div id="overlay" onclick="closeOverlay()">
        <div class="reward-card">
            <div class="card-inner-border" id="card-inner-content">
                </div>
        </div>
    </div>

    <script>
        const cardPool = [
            { id: 1, name: "温柔陪看券", rarity: "SR", desc: "放下手机，陪你看30分钟你喜欢的剧" },
            { id: 2, name: "今日免单券", rarity: "SR", desc: "今天的所有美食开销，由老婆赞助" },
            { id: 3, name: "晚安按摩券", rarity: "SSR", desc: "缓解一天的疲惫，享受30分钟专属按摩" },
            { id: 4, name: "购物车锦鲤", rarity: "SSR", desc: "200元以内的心愿，老婆帮你实现" },
            { id: 5, name: "爱情森林水", rarity: "UR", desc: "为你浇灌蚂蚁森林，见证我们的爱长成大树" },
            { id: 6, name: "爱心深夜食堂", rarity: "R", desc: "一份热腾腾的宵夜，温暖你的胃" }
        ];

        let userData = JSON.parse(localStorage.getItem('coupleData_v5')) || {
            total: 0,
            draws: 0,
            ownedCards: {} 
        };

        function updateUI() {
            document.getElementById('total-count').innerText = userData.total;
            document.getElementById('draw-count').innerText = userData.draws;
            document.getElementById('draw-btn').style.display = userData.draws > 0 ? 'inline-block' : 'none';
            
            const album = document.getElementById('card-album');
            album.innerHTML = '';
            cardPool.forEach(card => {
                const count = userData.ownedCards[card.id] || 0;
                const slot = document.createElement('div');
                slot.className = `card-slot ${count > 0 ? 'card-active' : ''}`;
                
                if (count > 0) {
                    slot.innerHTML = `
                        <div style="font-size:10px; font-weight:900; color:var(--deep-pink)">${card.rarity}</div>
                        <span style="font-weight:bold; font-size:13px; color:var(--text-dark); margin-top:5px;">${card.name}</span>
                        <span style="font-size:10px; color:#c4a4a4; margin-top:3px;">x${count}</span>`;
                } else {
                    slot.innerHTML = `<div style="color:white; font-size:24px; text-shadow: 0 0 5px #ffb6c1;">?</div>`;
                }
                album.appendChild(slot);
            });
            localStorage.setItem('coupleData_v5', JSON.stringify(userData));
        }

        function doTask(taskId) {
            const btn = document.getElementById('task-' + taskId);
            userData.total++;
            if (userData.total % 5 === 0) userData.draws++;
            
            btn.disabled = true;
            let timeLeft = 60;
            btn.innerText = timeLeft + 's';
            const timer = setInterval(() => {
                timeLeft--;
                btn.innerText = timeLeft > 0 ? timeLeft + 's' : '打卡';
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                }
            }, 1000);
            updateUI();
        }

        function drawCard() {
            if (userData.draws <= 0) return;
            userData.draws--;
            const randomCard = cardPool[Math.floor(Math.random() * cardPool.length)];
            userData.ownedCards[randomCard.id] = (userData.ownedCards[randomCard.id] || 0) + 1;

            const content = document.getElementById('card-inner-content');
            content.innerHTML = `
                <div class="rarity-label rarity-${randomCard.rarity.toLowerCase()}">${randomCard.rarity}</div>
                <div style="font-size: 1.6em; color: var(--deep-pink); font-weight:bold; margin-bottom:15px; border-bottom: 2px solid #ffeef2; padding-bottom:10px;">${randomCard.name}</div>
                <p style="color:#7d6363; line-height:1.6; font-size: 0.95em;">${randomCard.desc}</p>
                <div style="margin-top:20px; font-size:0.8em; color:#bbb;">- 浪漫收集册专属奖券 -</div>
            `;
            
            document.getElementById('overlay').style.display = 'flex';
            updateUI();
        }

        function closeOverlay() {
            document.getElementById('overlay').style.display = 'none';
        }

        updateUI();
    </script>
</body>
</html>
