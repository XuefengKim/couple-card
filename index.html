<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💌 我们的浪漫收集册</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* 调色盘：更高级的粉色系 */
            --soft-pink: #fff0f3;
            --medium-pink: #ffdae0;
            --deep-pink: #ff85a1;
            --accent-pink: #f72585;
            --text-main: #6d5959;
            --card-bg: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'PingFang SC', 'STHeiti', 'Microsoft YaHei', sans-serif;
            /* 替换为粉色渐变背景 */
            background: linear-gradient(135deg, #fff5f6 0%, #ffdee5 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 30px 0 80px 0;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 玻璃拟态看板 */
        .dashboard {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 88%;
            max-width: 380px;
            padding: 30px 20px;
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(255, 133, 161, 0.15);
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-sizing: border-box;
        }

        .dashboard h2 {
            margin: 0 0 12px 0;
            color: var(--deep-pink);
            font-size: 1.4em;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .dashboard p {
            margin: 0;
            font-size: 0.8em;
            color: #a38b8b;
            letter-spacing: 1px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
        }

        .stat-item {
            position: relative;
        }

        .stat-item span {
            display: block;
            font-size: 32px;
            font-weight: 300; /* 细体更有高级感 */
            color: var(--accent-pink);
            font-family: 'Georgia', serif;
        }

        .stat-item p {
            font-size: 11px;
            margin-top: 5px;
            color: var(--text-main);
            opacity: 0.7;
        }

        /* 极简任务卡片 */
        .section-container {
            width: 88%;
            max-width: 380px;
        }

        .section-title {
            font-size: 0.95em;
            color: var(--deep-pink);
            margin: 25px 0 15px 10px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            font-weight: 600;
        }

        .section-title i {
            font-size: 0.8em;
            margin-right: 8px;
            opacity: 0.6;
        }

        .task-card {
            background: var(--card-bg);
            padding: 18px 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .task-name {
            font-size: 0.95em;
            color: #5d4d4d;
        }

        .btn-check {
            background: white;
            border: 1px solid var(--medium-pink);
            color: var(--deep-pink);
            padding: 7px 16px;
            border-radius: 15px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-check:disabled {
            background: transparent;
            color: #ccc;
            border-color: #eee;
        }

        /* 抽卡按钮 */
        #draw-btn {
            background: var(--deep-pink);
            color: white;
            border: none;
            padding: 14px 45px;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 133, 161, 0.3);
            display: none;
            margin: 10px 0 30px 0;
            transition: all 0.3s;
        }

        /* 收集册 */
        .album {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 88%;
            max-width: 380px;
        }

        .card-slot {
            background: rgba(255, 255, 255, 0.3);
            aspect-ratio: 3/4;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-active {
            background: white;
            box-shadow: 0 10px 20px rgba(255, 182, 193, 0.2);
            border: none;
        }

        .rarity-tag {
            font-size: 0.65em;
            padding: 2px 8px;
            border-radius: 5px;
            color: white;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .rarity-r { background: #bde0fe; }
        .rarity-sr { background: #cdb4db; }
        .rarity-ssr { background: #ffafcc; }
        .rarity-ur { background: #fb6f92; animation: float 3s infinite ease-in-out; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* 抽卡弹窗 */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 245, 246, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .new-card-anim {
            text-align: center;
            animation: zoomIn 0.5s ease-out;
        }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .footer {
            margin-top: 50px;
            font-size: 0.7em;
            color: #d1b1b1;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>Our Sweet Memory</h2>
        <p>让每一份心意都有迹可循</p>
        <div class="stats">
            <div class="stat-item">
                <span id="total-count">0</span>
                <p>累计心意</p>
            </div>
            <div class="stat-item">
                <span id="draw-count">0</span>
                <p>待领惊喜</p>
            </div>
        </div>
    </div>

    <button id="draw-btn" onclick="drawCard()">开启惊喜盲盒 ✨</button>

    <div class="section-container">
        <div class="section-title"><i class="far fa-heart"></i> 浪漫任务</div>
        <div class="task-card">
            <span class="task-name">给老婆写一首小诗</span>
            <button class="btn-check" id="task-poem" onclick="doTask('poem')">打卡</button>
        </div>
        <div class="task-card">
            <span class="task-name">记录一次电影时光</span>
            <button class="btn-check" id="task-movie" onclick="doTask('movie')">打卡</button>
        </div>
        <div class="task-card">
            <span class="task-name">打卡一家心动餐厅</span>
            <button class="btn-check" id="task-food" onclick="doTask('food')">打卡</button>
        </div>
    </div>

    <div class="section-container">
        <div class="section-title"><i class="far fa-star"></i> 日常点滴</div>
        <div class="task-card">
            <span class="task-name">分担一次衣物洗涤</span>
            <button class="btn-check" id="task-wash" onclick="doTask('wash')">打卡</button>
        </div>
        <div class="task-card">
            <span class="task-name">承包今天的厨房</span>
            <button class="btn-check" id="task-cook" onclick="doTask('cook')">打卡</button>
        </div>
        <div class="task-card">
            <span class="task-name">顺手带走门口的垃圾</span>
            <button class="btn-check" id="task-trash" onclick="doTask('trash')">打卡</button>
        </div>
    </div>

    <div class="section-container">
        <div class="section-title"><i class="far fa-images"></i> 收集册</div>
    </div>
    
    <div class="album" id="card-album"></div>

    <div class="footer">FOR MY ONLY LOVE</div>

    <div id="overlay" onclick="closeOverlay()">
        <div class="new-card-anim" id="reward-box">
            <div id="new-card-detail"></div>
            <p style="color:#ce9393; font-size: 0.8em; margin-top:40px; letter-spacing: 2px;">点击任意位置收好这张卡片</p>
        </div>
    </div>

    <script>
        const cardPool = [
            { id: 1, name: "温柔陪看券", rarity: "SR", desc: "放下手机，陪你看30分钟你喜欢的剧" },
            { id: 2, name: "今日免单券", rarity: "SR", desc: "今天的所有美食开销，由老婆赞助" },
            { id: 3, name: "晚安按摩券", rarity: "SSR", desc: "缓解一天的疲惫，享受30分钟专属按摩" },
            { id: 4, name: "购物车锦鲤", rarity: "SSR", desc: "200元以内的心愿，老婆帮你实现" },
            { id: 5, name: "爱情森林水", rarity: "UR", desc: "为你浇灌蚂蚁森林，见证我们的爱长成大树" },
            { id: 6, name: "爱心深夜食堂", rarity: "R", desc: "一份热腾腾的宵夜，温暖你的胃" }
        ];

        let userData = JSON.parse(localStorage.getItem('coupleData_v4')) || {
            total: 0,
            draws: 0,
            ownedCards: {} 
        };

        function updateUI() {
            document.getElementById('total-count').innerText = userData.total;
            document.getElementById('draw-count').innerText = userData.draws;
            document.getElementById('draw-btn').style.display = userData.draws > 0 ? 'inline-block' : 'none';
            
            const album = document.getElementById('card-album');
            album.innerHTML = '';
            cardPool.forEach(card => {
                const count = userData.ownedCards[card.id] || 0;
                const slot = document.createElement('div');
                slot.className = `card-slot ${count > 0 ? 'card-active' : ''}`;
                
                if (count > 0) {
                    slot.innerHTML = `
                        <div class="rarity-tag rarity-${card.rarity.toLowerCase()}">${card.rarity}</div>
                        <span style="font-weight:600; font-size:14px; color:#5d4d4d;">${card.name}</span>
                        <span style="font-size:10px; color:#c4a4a4; margin-top:5px;">拥有数量: ${count}</span>`;
                } else {
                    slot.innerHTML = `<div style="color:rgba(255,255,255,0.8); font-size:24px">?</div>`;
                }
                album.appendChild(slot);
            });
            localStorage.setItem('coupleData_v4', JSON.stringify(userData));
        }

        function doTask(taskId) {
            const btn = document.getElementById('task-' + taskId);
            userData.total++;
            if (userData.total % 5 === 0) userData.draws++;
            
            btn.disabled = true;
            let timeLeft = 60;
            btn.innerText = timeLeft + 's';
            const timer = setInterval(() => {
                timeLeft--;
                btn.innerText = timeLeft > 0 ? timeLeft + 's' : '打卡';
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                }
            }, 1000);
            updateUI();
        }

        function drawCard() {
            if (userData.draws <= 0) return;
            userData.draws--;
            const randomCard = cardPool[Math.floor(Math.random() * cardPool.length)];
            userData.ownedCards[randomCard.id] = (userData.ownedCards[randomCard.id] || 0) + 1;

            document.getElementById('new-card-detail').innerHTML = `
                <div class="rarity-tag rarity-${randomCard.rarity.toLowerCase()}" style="display:inline-block; margin-bottom:20px;">${randomCard.rarity}</div>
                <div style="font-size: 1.8em; color: #ff85a1; font-weight:bold; margin-bottom:15px;">${randomCard.name}</div>
                <p style="color:#8b7d7d; line-height:1.6; padding:0 20px;">${randomCard.desc}</p>
            `;
            document.getElementById('overlay').style.display = 'flex';
            updateUI();
        }

        function closeOverlay() {
            document.getElementById('overlay').style.display = 'none';
        }

        updateUI();
    </script>
</body>
</html>
